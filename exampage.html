<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Exam | Standardized Testing</title>
    <style>
      
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #f97316;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            background: var(--primary);
            color: white;
            padding: 5px 10px;
            font-weight: bold;
            border-radius: 6px;
        }

        .timer-box {
            background: #f8f6f4;
            border: 1px solid whitesmoke;
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: green;
            font-weight: 700;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .btn-submit {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #dc2626;
            color: white;
        }

      
        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

       
        .question-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover {
            border-color: var(--primary);
            background: #f5f3ff;
        }

        .option-item input {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option-item.selected {
            border-color: var(--primary);
            background: #eef2ff;
            font-weight: 600;
        }

       
        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
        }

        .btn-nav {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-prev {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-next {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .btn-next:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

       
        .sidebar {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .sidebar-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .num-btn {
            aspect-ratio: 1/1;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .num-btn.answered {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .num-btn.current {
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        /* --- 9. Responsive --- */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: -1;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="brand">
            <div class="logo-box">CBT</div>
            <div>
                <strong style="display: block; font-size: 0.9rem;">CSC 401</strong>
                <small style="color: var(--text-muted);">Artificial Intelligence</small>
            </div>
        </div>

        <div class="timer-box">
            <span>00:00</span>
        </div>

        <button class="btn-submit" onclick="submit()">Submit Exam</button>
    </nav>

    <div class="container">
        <div class="main-content">
            <div class="question-card">
                <div class="question-meta">
                    <span>Question 1 of 10</span>
                    <span>1.0 Marks</span>
                </div>

                <h2 class="question-text" id="exam-questions">
                    Loading question...
                </h2>

                <div class="options-list" id="exam-options">

                </div>
            </div>

            <div class="nav-controls">
                <button class="btn-nav btn-prev" id="previous">← Previous</button>
                <button class="btn-nav btn-next" id="next">Next Question →</button>
            </div>
        </div>

        <aside class="sidebar">
            <h3 class="sidebar-title">Question Palette</h3>
            <div class="palette">

            </div>

            <div style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-muted);">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <span style="width: 10px; height: 10px; background: var(--primary); border-radius: 2px;"></span>
                    Answered
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span
                        style="width: 10px; height: 10px; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 2px;"></span>
                    Unanswered
                </div>
            </div>
        </aside>
    </div>

</body>

</html>

<script>

    let previousQuestion = document.querySelector('#previous');
    let nextQuestion = document.querySelector('#next');
    let submitExam = document.querySelector('.btn-submit');

    let timeInMinutes = 10;
    let timeInSeconds = timeInMinutes * 60;
    const timerDisplay = document.querySelector('.timer-box');

   
    function resetExamForNewStudent() {
        localStorage.removeItem('cbtData');
        timeInSeconds = timeInMinutes * 60;
    }
    resetExamForNewStudent();
    let questions = [
        {
            id: 1,
            question: "What is the capital of France?",
            options: ["Berlin", "Madrid", "Paris", "Rome"],
            correctAnswer: 2
        },
        {
            id: 2,
            question: "Which language runs in the browser?",
            options: ["Python", "Java", "C++", "JavaScript"],
            correctAnswer: 3
        },
        {
            id: 3,
            question: "What does CSS stand for?",
            options: ["Central Style Sheets", "Cascading Style Sheets", "Cascading Simple Sheets", "Cars SUVs Sailboats"],
            correctAnswer: 1
        },
        {
            id: 4,
            question: "What year was JavaScript launched?",
            options: ["1996", "1995", "1994", "None of the above"],
            correctAnswer: 1
        },
        {
            id: 5,
            question: "Which company developed the React library?",
            options: ["Google", "Facebook", "Microsoft", "Apple"],
            correctAnswer: 1
        },
        {
            id: 6,
            question: "What does HTML stand for?",
            options: ["Hyper Trainer Marking Language", "Hyper Text Markup Language", "Hyper Text Marketing Language", "Hyper Text Markup Leveler"],
            correctAnswer: 1
        },
        {
            id: 7,
            question: "Which of the following is a JavaScript framework?",
            options: ["Django", "Flask", "Angular", "Laravel"],
            correctAnswer: 2
        },
        {
            id: 8,
            question: "What is the main purpose of Git?",
            options: ["Version Control", "Web Development", "Database Management", "Graphic Design"],
            correctAnswer: 0
        },
        {
            id: 9,
            question: "Which of the following is NOT a programming language?",
            options: ["Python", "Ruby", "HTML", "Java"],
            correctAnswer: 2
        },
        {
            id: 10,
            question: "What does API stand for?",
            options: ["Application Programming Interface", "Applied Programming Interface", "Application Protocol Interface", "Applied Protocol Interface"],
            correctAnswer: 0
        }
    ];

    localStorage.setItem("cbtQuestions", JSON.stringify(questions));

    let currentQuestionIndex = 0;

    const questionMeta = document.querySelector('.question-meta');
    const questionText = document.querySelector('.question-text');
    const optionsList = document.getElementById('exam-options');

    function loadFromStorage() { 
        const savedData = localStorage.getItem('cbtData'); 
        if (savedData) { 
            const parsed = JSON.parse(savedData); 
            questions = parsed.questions; 
            currentQuestionIndex = parsed.currentQuestionIndex; 
            timeInSeconds = parsed.timeInSeconds; 
        } 
    } 
    loadFromStorage(); 
    displayQuestions();

    function displayQuestions() {
        const current = questions[currentQuestionIndex];

        questionMeta.innerHTML = `Question ${currentQuestionIndex + 1} of ${questions.length} <span>1.0 Marks</span>`;
        questionText.textContent = current.question;
        optionsList.innerHTML = '';
        for (let i = 0; i < current.options.length; i++) {
            const optionText = current.options[i];
            const isChecked = (current.userAnswer === i) ? 'checked' : '';

            optionsList.innerHTML += `
                <div class="option-item">
                    <input type="radio" name="quiz-option" id="opt${i}" value="${i}" ${isChecked}>
                    <label for="opt${i}">${optionText}</label>
                </div>
            `;
        }

        const radioButtons = document.querySelectorAll('input[name="quiz-option"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function () {
                questions[currentQuestionIndex].userAnswer = parseInt(this.value);
            });
        });
    }

    function next() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex += 1;
            displayQuestions();
        } else {
            alert("You have reached the end of the exam!");
        }
    }

    const nextBtn = document.querySelector('.btn-next');
    nextBtn.addEventListener('click', () => {
        saveAnswer();
        next();
    });

    function prev() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex -= 1;
            displayQuestions();
        } else {
            alert("click next to move to the next question!");
        }
    }

    const prevBtn = document.querySelector('.btn-prev');
    prevBtn.addEventListener('click', () => {
        saveAnswer();
        prev();
    });

    function saveAnswer() {
        const selectedOption = document.querySelector('input[name="quiz-option"]:checked');
        if (selectedOption) {
            questions[currentQuestionIndex].userAnswer = parseInt(selectedOption.value);
            saveToStorage();
        }
    }

    function submit() {
        saveAnswer();
        let score = 0;
        let answered = 0;

        for (let i = 0; i < questions.length; i++) {
            if (questions[i].userAnswer !== undefined) {
                answered++;
                if (questions[i].userAnswer === questions[i].correctAnswer) {
                    score++;
                }
            }
        }

        const percentage = (score / questions.length) * 100;
        let resultMessage = `You scored ${score} out of ${questions.length} (${percentage}%)\n\n`;
        resultMessage += `You answered ${answered} out of ${questions.length} questions.`;

        if (percentage >= 40) {
            resultMessage += `\n\nCongratulations! You passed!`;
        } else {
            resultMessage += `\n\nKeep trying! You need 70% to pass.`;
        }
        alert(resultMessage);
        localStorage.removeItem('cbtData');
        window.location.href = 'login.html';
    }

    function startTimer() {
        const countdown = setInterval(() => {
            let minutes = Math.floor(timeInSeconds / 60);
            let seconds = timeInSeconds % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            timerDisplay.textContent = `${minutes}:${seconds}`;

            if (timeInSeconds <= 0) {
                clearInterval(countdown);
                alert("Time is up! Your exam will be submitted automatically.");
                submitExam();
            } else {
                timeInSeconds--;
                saveToStorage();
            }
            if (timeInSeconds < 60) {
                timerDisplay.style.color = 'red';
            }
        }, 1000);
    }
    startTimer();

    function saveToStorage() {
        localStorage.setItem('cbtData', JSON.stringify({
            questions,
            currentQuestionIndex,
            timeInSeconds
        })
        );
    }

</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text-dark: #1e293b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { 
            background-color: var(--bg); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: #eef2ff;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 12px;
            margin: 0 auto 20px;
        }

        h2 { color: var(--text-dark); margin-bottom: 10px; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #475569; 
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .login-btn:hover { background: #4338ca; }

        .footer-text { margin-top: 25px; font-size: 0.85rem; color: #64748b; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">CBT</div>
        <h2>Student Login</h2>
        <p>Please enter your exam credentials</p>

        <form>
            <div class="form-group">
                <label>Examination Number</label>
                <input type="text" placeholder="e.g. CBT/2024/001">
            </div>
            <div class="form-group">
                <label>Access Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="#">Register here</a>
        </div>
    </div>
</body>
</html>

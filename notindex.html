<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Dashboard | CBT App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-700 p-8 text-white flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-lg text-indigo-700 font-black text-xl">CBT</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight uppercase">Examination Portal</h1>
                    <p class="text-indigo-100 text-sm opacity-80" id="welcome-el">Welcome back, Student</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <span class="bg-indigo-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">2025/2026
                    Session</span>
            </div>
        </div>

        <div class="p-8 grid md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <h3 class="text-slate-800 font-bold border-b pb-2 uppercase text-sm tracking-wider">Student Profile</h3>
                <div class="space-y-3">
                    <p class="flex justify-between border-b border-slate-50 py-1"><span class="text-slate-500"
                            id="username">Name:</span> <span class="font-semibold text-slate-700"></span></p>
                    <p class="flex justify-between border-b border-slate-50 py-1"><span class="text-slate-500"
                            id="department">Department:</span> <span class="font-semibold text-slate-700"></span></p>
                    <p class="flex justify-between border-b border-slate-50 py-1"><span class="text-slate-500"
                            id="level">Level:</span> <span class="font-semibold text-slate-700"></span></p>
                    <p class="flex justify-between py-1"><span class="text-slate-500" id="exam-no">Exam No:</span> <span
                            class="font-mono bg-slate-100 px-2 rounded font-bold text-indigo-600">CBT-102-99</span></p>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-slate-800 font-bold border-b pb-2 uppercase text-sm tracking-wider">Exam Details</h3>
                <div class="space-y-3">
                    <p class="flex justify-between border-b border-slate-50 py-1"><span
                            class="text-slate-500">Course:</span> <span class="font-semibold text-slate-700">CSC
                            401</span></p>
                    <p class="flex justify-between border-b border-slate-50 py-1"><span
                            class="text-slate-500">Title:</span> <span class="font-semibold text-slate-700">Artificial
                            Intelligence</span></p>
                    <p class="flex justify-between py-1"><span class="text-slate-500 text-orange-600">Time Limit:</span>
                        <span class="font-bold text-orange-600">10 Minutes</span>
                    </p>
                </div>
                <div class="bg-blue-50 p-3 rounded-lg text-xs text-blue-700 italic border border-blue-100">
                    Warning: Do not open other tabs during the examination.
                </div>
            </div>
        </div>

        <div class="p-8 bg-slate-50 border-t border-slate-200 flex flex-col items-center">
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-xl
                 shadow-lg transition-transform active:scale-95 uppercase tracking-widest" id="my-button"
                onclick="startExam()">
                Click here to start
            </button>
            <!-- <a href="#" class="mt-4 text-xs text-slate-400 hover:text-red-500 transition-colors underline">Not your account? Logout</a> -->
        </div>
    </div>
</body>


<script>
    let welcomeBack = document.getElementById('welcome-el')
    let myButton = document.getElementById('my-button')
    let userDatabase = JSON.parse(localStorage.getItem("studentDetails")) || null
    console.log(userDatabase);

    let currentStudentIndex = localStorage.getItem("currentStudent")
    console.log(currentStudentIndex);
    let currentUser = userDatabase[currentStudentIndex]
    console.log(currentUser);

    if (!currentUser) {
        window.location.href = 'login.html'
    }
    else {
        welcomeBack.textContent = `Welcome back, ${currentUser.name}`
        document.getElementById('username').textContent = `Name: ${currentUser.name}`
        document.getElementById('department').textContent = `Department: ${currentUser.department}`
        document.getElementById('level').textContent = `Level: ${currentUser.level} Level`
        document.getElementById('exam-no').innerHTML = `Exam No: <span class="font-mono bg-slate-100 px-2 rounded font-bold text-indigo-600">${currentUser.examNumber}</span>`
    }

    function startExam() {
        alert('exam is starting...')

        setTimeout(() => {
            myButton.innerHTML = 'Loading...'
            myButton.disabled = true
            window.location.href = 'exampage.html'
        }, 2000)
    }





</script>

</html>
